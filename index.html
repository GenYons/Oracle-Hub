<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Hub Pro | SaaS Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --card: #0d1117; --text: #f0f6fc; --green: #238636; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* تصميم SaaS الاحترافي */
        .saas-terminal { max-width: 800px; margin: 20px auto; border: 1px solid #30363d; border-radius: 12px; background: #010409; overflow: hidden; }
        .terminal-header { background: #161b22; padding: 15px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        
        /* بطاقة المباراة */
        .match-vault { padding: 30px 20px; text-align: center; }
        .team-row { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 1.2rem; font-weight: bold; }
        .vs-circle { width: 40px; height: 40px; border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: var(--gold); }
        
        /* العداد التنازلي */
        .timer-box { margin: 25px 0; padding: 15px; background: #0d1117; border-radius: 8px; border: 1px dashed #30363d; }
        .timer-digits { font-size: 2.5rem; color: var(--gold); font-weight: 700; letter-spacing: 5px; }

        /* الرادار التكتيكي (نهج يونس) */
        .tactical-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .stat-card { background: #161b22; padding: 15px; border-radius: 8px; border-right: 3px solid var(--gold); text-align: right; }
        .stat-label { font-size: 0.75rem; color: #8b949e; display: block; }
        .stat-value { font-size: 1.1rem; font-weight: bold; color: var(--text); }

        /* الأمان والاتصال */
        .status-bar { padding: 10px; font-size: 0.7rem; color: #8b949e; border-top: 1px solid #30363d; display: flex; gap: 15px; }
        .online-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<div class="saas-terminal">
    <div class="terminal-header">
        <div><strong>ORACLE HUB <span style="color:var(--gold)">PRO</span></strong></div>
        <div style="font-size: 0.8rem; opacity: 0.7;">SaaS Lab v0.1</div>
    </div>

    <div class="match-vault">
        <div class="team-row">
            <span>CZE</span>
            <div class="vs-circle">VS</div>
            <span>DEN</span>
        </div>

        <div class="timer-box">
            <div id="countdown" class="timer-digits">00 : 00 : 00</div>
            <small style="color: #8b949e;">الوقت المتبقي لضربة البداية</small>
        </div>

        <div class="tactical-grid">
            <div class="stat-card">
                <span class="stat-label">الاستحواذ السلبي/الفعال</span>
                <span class="stat-value" id="possession">-- %</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">المرتدات (التحول السريع)</span>
                <span class="stat-value" id="counters">--</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">قوة الأجنحة (ركنيات)</span>
                <span class="stat-value" id="corners">--</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">صلابة الحارس (Saves)</span>
                <span class="stat-value" id="saves">--</span>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span><span class="online-dot"></span> المحرك: متصل</span>
        <span>🔐 
        </span>
        <span id="api-status">📡 مزامنة API...</span>
    </div>
</div>

<script>
    
    const _V1 = "30b6"; 
    const _V2 = "cd91ee41"; 
    const _V3 = "401baf6c"; 
    const _V4 = "0ebb141c"; 
    const _V5 = "9283";

    function _engine() { return _V1 + _V2 + _V3 + _V4 + _V5; }

    // --- [ المرحلة 1: العداد التنازلي للمباراة ] ---
    const kickOff = new Date("2026-03-31T19:45:00Z").getTime();

    const timer = setInterval(() => {
        const now = new Date().getTime();
        const diff = kickOff - now;

        if (diff < 0) {
            document.getElementById("countdown").innerHTML = "LIVE";
            document.getElementById("api-status").innerText = "🔴 المباراة بدأت - جلب المعطيات التكتيكية...";
            clearInterval(timer);
            return;
        }

        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');

        document.getElementById("countdown").innerHTML = `${h} : ${m} : ${s}`;
    }, 1000);

    // --- [ المرحلة 2: محرك جلب البيانات (SaaS Logic) ] ---
    // ملاحظة: سيتم تفعيل الجلب الحقيقي عند بداية المباراة غداً
    async function fetchTacticalData() {
        // سيتم ربط الـ API ID الخاص بمباراة التشيك والدنمارك هنا
        console.log("الخزنة جاهزة بمفتاح: " + _engine().substring(0,5) + "...");
    }
    
    fetchTacticalData();
</script>
</body>
</html>
