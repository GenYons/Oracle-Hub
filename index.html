
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Hub Pro | SaaS Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --card: #0d1117; --text: #f0f6fc; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .saas-terminal { max-width: 800px; margin: 20px auto; border: 1px solid #30363d; border-radius: 12px; background: #010409; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .terminal-header { background: #161b22; padding: 15px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; }
        .match-vault { padding: 30px 20px; text-align: center; }
        .timer-box { margin: 25px 0; padding: 20px; background: #0d1117; border-radius: 12px; border: 1px dashed #30363d; }
        .timer-digits { font-size: 3rem; color: var(--gold); font-weight: 700; }
        .tactical-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .stat-card { background: #161b22; padding: 15px; border-radius: 10px; border-right: 4px solid var(--gold); text-align: right; }
        .stat-label { font-size: 0.8rem; color: #8b949e; display: block; }
        .stat-value { font-size: 1.3rem; font-weight: bold; }
        .status-bar { padding: 12px; font-size: 0.75rem; color: #8b949e; border-top: 1px solid #30363d; display: flex; justify-content: space-between; }
        .pulse { animation: pulse-red 2s infinite; color: #ff4500; font-weight: bold; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="saas-terminal">
    <div class="terminal-header">
        <div><strong>ORACLE HUB <span style="color:var(--gold)">PRO</span></strong></div>
        <div id="api-status" style="font-size: 0.8rem; color: var(--gold);">📡 نظام الـ ID نشط</div>
    </div>

    <div class="match-vault">
        <div style="display: flex; justify-content: center; gap: 20px; font-size: 1.5rem; font-weight: bold;">
            <span>CZE</span> <div style="color:var(--gold)">VS</div> <span>DEN</span>
        </div>

        <div class="timer-box">
            <div id="countdown" class="timer-digits">00 : 00 : 00</div>
            <p id="match-status" style="margin-top: 10px; color: #8b949e;">جاري مزامنة بيانات المباراة...</p>
        </div>

        <div class="tactical-grid">
            <div class="stat-card"><span class="stat-label">الاستحواذ (نهج يونس)</span><span class="stat-value" id="possession">-- %</span></div>
            <div class="stat-card"><span class="stat-label">قوة الأجنحة (ركنيات)</span><span class="stat-value" id="corners">--</span></div>
            <div class="stat-card"><span class="stat-label">المرتدات (التحول)</span><span class="stat-value" id="counters">--</span></div>
            <div class="stat-card"><span class="stat-label">صلابة الحارس</span><span class="stat-value" id="saves">--</span></div>
        </div>
    </div>

    <div class="status-bar">
        <span>🟢 المحرك: يعمل بنظام الـ ID</span>
        <span id="oracle-log">🔐 تشفير يونس: 1146313</span>
    </div>
</div>

<script>
    // 1. نظام التوثيق والتشفير
    const _P = ["30b6", "cd91ee41", "401baf6c", "0ebb141c", "9283"];
    function _auth() { return _P.join(""); }

    // 2. الـ ID المحدد لمباراة التشيك والدنمارك
    const targetFixtureId = 1146313; 
    const kickOff = new Date("2026-03-31T19:45:00Z").getTime();

    // 3. المحرك الزمني والجلب المباشر
    const mainTimer = setInterval(() => {
        const now = new Date().getTime();
        const diff = kickOff - now;

        if (diff < 0) {
            document.getElementById("countdown").innerHTML = "LIVE";
            document.getElementById("countdown").style.color = "#ff4500";
            document.getElementById("match-status").innerHTML = "<span class='pulse'>تحليل الأوراكل قيد التنفيذ (ID: 1146313)</span>";
            
            // بدء الجلب الفوري وتكراره كل 60 ثانية
            fetchLiveStats(targetFixtureId);
            setInterval(() => fetchLiveStats(targetFixtureId), 60000);
            
            clearInterval(mainTimer);
            return;
        }

        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        document.getElementById("countdown").innerHTML = `${h} : ${m} : ${s}`;
    }, 1000);

    // 4. دالة الجلب الصارمة عبر الـ ID
    async function fetchLiveStats(fId) {
        try {
            const response = await fetch(`https://api-football-v1.p.rapidapi.com/v3/fixtures/statistics?fixture=${fId}`, {
                method: 'GET',
                headers: { 
                    'X-RapidAPI-Key': _auth(), 
                    'X-RapidAPI-Host': 'api-football-v1.p.rapidapi.com' 
                }
            });
            const data = await response.json();

            if (data.response && data.response.length > 0) {
                // نأخذ إحصائيات الفريقين (index 0 و 1) ونعرض متوسط الاستحواذ كمثال أو إحصائيات الضيف
                const stats = data.response[1].statistics; // إحصائيات الدنمارك
                updateUI(stats);
                document.getElementById("oracle-log").innerText = "✅ تحديث البيانات ناجح";
            } else {
                document.getElementById("oracle-log").innerText = "⚠️ المباراة لم تبدأ بياناتها بعد";
            }
        } catch (error) {
            console.error("API Error:", error);
            document.getElementById("oracle-log").innerText = "❌ فشل في جلب البيانات";
        }
    }

    // 5. تحديث الواجهة الرسومية
    function updateUI(stats) {
        const getVal = (type) => stats.find(s => s.type === type)?.value || 0;
        
        document.getElementById('possession').innerText = getVal("Ball Possession") || "0%";
        document.getElementById('corners').innerText = getVal("Corner Kicks") || "0";
        document.getElementById('saves').innerText = getVal("Goalkeeper Saves") || "0";
        document.getElementById('counters').innerText = getVal("Counter Attacks") || "0";
    }
</script>
</body>
</html>
