<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Hub Pro | Live Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --card: #0d1117; --text: #f0f6fc; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .saas-terminal { max-width: 800px; margin: 20px auto; border: 1px solid #30363d; border-radius: 12px; background: #010409; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .terminal-header { background: #161b22; padding: 15px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; }
        .match-vault { padding: 30px 20px; text-align: center; }
        .timer-box { margin: 25px 0; padding: 20px; background: #0d1117; border-radius: 12px; border: 1px dashed #30363d; }
        .timer-digits { font-size: 3rem; color: var(--gold); font-weight: 700; }
        .tactical-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .stat-card { background: #161b22; padding: 15px; border-radius: 10px; border-right: 4px solid var(--gold); text-align: right; }
        .stat-label { font-size: 0.8rem; color: #8b949e; display: block; }
        .stat-value { font-size: 1.3rem; font-weight: bold; }
        .status-bar { padding: 12px; font-size: 0.75rem; color: #8b949e; border-top: 1px solid #30363d; display: flex; justify-content: space-between; }
        .pulse { animation: pulse-red 2s infinite; color: #ff4500; font-weight: bold; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="saas-terminal">
    <div class="terminal-header">
        <div><strong>ORACLE HUB <span style="color:var(--gold)">PRO</span></strong></div>
        <div id="api-status" style="font-size: 0.8rem; color: var(--gold);">📡 نظام البحث الذكي نشط</div>
    </div>

    <div class="match-vault">
        <div id="teams-display" style="display: flex; justify-content: center; gap: 20px; font-size: 1.5rem; font-weight: bold;">
            <span id="home-team">TEAM A</span> <div style="color:var(--gold)">VS</div> <span id="away-team">TEAM B</span>
        </div>

        <div class="timer-box">
            <div id="countdown" class="timer-digits">-- : -- : --</div>
            <p id="match-status" style="margin-top: 10px; color: #8b949e;">جاري البحث عن أقرب مباراة مباشرة...</p>
        </div>

        <div class="tactical-grid">
            <div class="stat-card"><span class="stat-label">الاستحواذ</span><span class="stat-value" id="possession">-- %</span></div>
            <div class="stat-card"><span class="stat-label">الركنـيات</span><span class="stat-value" id="corners">--</span></div>
            <div class="stat-card"><span class="stat-label">المرتـدات</span><span class="stat-value" id="counters">--</span></div>
            <div class="stat-card"><span class="stat-label">تصديات الحارس</span><span class="stat-value" id="saves">--</span></div>
        </div>
    </div>

    <div class="status-bar">
        <span id="engine-mode">🟢 محرك البحث الذكي: جاري الفحص</span>
        <span id="oracle-log">🔐 بانتظار التشفير...</span>
    </div>
</div>

<script>
    // 1. التوثيق والإعدادات
    const CONFIG = {
        keyParts: ["30b6", "cd91ee41", "401baf6c", "0ebb141c", "9283"],
        apiHost: 'api-football-v1.p.rapidapi.com'
    };

    const _auth = () => CONFIG.keyParts.join("");

    // 2. المحرك الرئيسي: البحث عن مباراة مباشرة تلقائياً
    async function initEngine() {
        document.getElementById("oracle-log").innerText = "🔍 جاري جلب المباريات المباشرة...";
        
        try {
            const response = await fetch(`https://${CONFIG.apiHost}/v3/fixtures?live=all`, {
                method: 'GET',
                headers: { 'X-RapidAPI-Key': _auth(), 'X-RapidAPI-Host': CONFIG.apiHost }
            });
            const data = await response.json();

            if (data.response && data.response.length > 0) {
                // نأخذ أول مباراة مباشرة متوفرة
                const liveMatch = data.response[0];
                setupMatch(liveMatch);
            } else {
                document.getElementById("match-status").innerText = "⚠️ لا توجد مباريات مباشرة حالياً.";
                document.getElementById("oracle-log").innerText = "📴 وضع الانتظار";
            }
        } catch (error) {
            document.getElementById("oracle-log").innerText = "❌ خطأ في الاتصال بالـ API";
        }
    }

    // 3. إعداد بيانات المباراة المكتشفة
    function setupMatch(match) {
        const fId = match.fixture.id;
        document.getElementById("home-team").innerText = match.teams.home.name;
        document.getElementById("away-team").innerText = match.teams.away.name;
        document.getElementById("countdown").innerText = "LIVE";
        document.getElementById("countdown").style.color = "#ff4500";
        document.getElementById("match-status").innerHTML = `<span class="pulse">تحليل مباشر قيد التنفيذ (ID: ${fId})</span>`;
        document.getElementById("engine-mode").innerText = `🟢 متصل بالمباراة: ${fId}`;

        // بدء جلب الإحصائيات فوراً وكل دقيقة
        fetchStats(fId);
        setInterval(() => fetchStats(fId), 60000);
    }

    // 4. جلب الإحصائيات الحية
    async function fetchStats(fId) {
        try {
            const response = await fetch(`https://${CONFIG.apiHost}/v3/fixtures/statistics?fixture=${fId}`, {
                method: 'GET',
                headers: { 'X-RapidAPI-Key': _auth(), 'X-RapidAPI-Host': CONFIG.apiHost }
            });
            const data = await response.json();

            if (data.response && data.response.length > 0) {
                // نأخذ إحصائيات الفريق الضيف (index 1) أو الأرضي (index 0)
                const stats = data.response[1]?.statistics || data.response[0]?.statistics;
                updateUI(stats);
                document.getElementById("oracle-log").innerText = `✅ تحديث: ${new Date().toLocaleTimeString('ar-EG')}`;
            }
        } catch (e) {
            document.getElementById("oracle-log").innerText = "⚠️ فشل تحديث الإحصائيات";
        }
    }

    // 5. تحديث الأرقام في الواجهة
    function updateUI(stats) {
        const getVal = (type) => stats.find(s => s.type === type)?.value || 0;
        
        document.getElementById('possession').innerText = getVal("Ball Possession") || "0%";
        document.getElementById('corners').innerText = getVal("Corner Kicks") || "0";
        document.getElementById('saves').innerText = getVal("Goalkeeper Saves") || "0";
        document.getElementById('counters').innerText = getVal("Counter Attacks") || "0";
    }

    // تشغيل المحرك عند فتح الصفحة
    initEngine();
</script>
</body>
</html>
