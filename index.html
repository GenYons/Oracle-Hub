<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Hub Pro | SaaS Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --card: #0d1117; --text: #f0f6fc; --green: #238636; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 10px; }
        .saas-terminal { max-width: 800px; margin: 20px auto; border: 1px solid #30363d; border-radius: 12px; background: #010409; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .terminal-header { background: #161b22; padding: 15px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .match-vault { padding: 30px 20px; text-align: center; }
        .team-row { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 1.5rem; font-weight: bold; }
        .vs-circle { width: 45px; height: 45px; border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .timer-box { margin: 25px 0; padding: 20px; background: #0d1117; border-radius: 12px; border: 1px dashed #30363d; }
        .timer-digits { font-size: 3rem; color: var(--gold); font-weight: 700; letter-spacing: 5px; text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .tactical-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .stat-card { background: #161b22; padding: 15px; border-radius: 10px; border-right: 4px solid var(--gold); text-align: right; transition: 0.3s; }
        .stat-label { font-size: 0.8rem; color: #8b949e; display: block; margin-bottom: 5px; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: var(--text); }
        .status-bar { padding: 12px; font-size: 0.75rem; color: #8b949e; border-top: 1px solid #30363d; display: flex; justify-content: space-between; }
        .pulse { animation: pulse-red 2s infinite; color: #ff4500; font-weight: bold; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="saas-terminal">
    <div class="terminal-header">
        <div><strong>ORACLE HUB <span style="color:var(--gold)">PRO</span></strong></div>
        <div style="font-size: 0.8rem; opacity: 0.8;">SaaS Lab v0.1</div>
    </div>

    <div class="match-vault">
        <div class="team-row">
            <span>CZE</span>
            <div class="vs-circle">VS</div>
            <span>DEN</span>
        </div>

        <div class="timer-box">
            <div id="countdown" class="timer-digits">00 : 00 : 00</div>
            <p id="match-status" style="margin-top: 10px; color: #8b949e;">في انتظار ضربة البداية (19:45)</p>
        </div>

        <div class="tactical-grid">
            <div class="stat-card"><span class="stat-label">الاستحواذ (نهج يونس)</span><span class="stat-value" id="possession">-- %</span></div>
            <div class="stat-card"><span class="stat-label">قوة الأجنحة (ركنيات)</span><span class="stat-value" id="corners">--</span></div>
            <div class="stat-card"><span class="stat-label">المرتدات (التحول)</span><span class="stat-value" id="counters">--</span></div>
            <div class="stat-card"><span class="stat-label">صلابة الحارس</span><span class="stat-value" id="saves">--</span></div>
        </div>
    </div>

    <div class="status-bar">
        <span>🟢 المحرك: جاهز</span>
        <span id="oracle-log">🔐 نظام تشفير يونس فعال</span>
        <span id="api-status">📡 API: مزامنة...</span>
    </div>
</div>

<script>
    // 1. مفتاح الأمان الموزع
    const _P = ["30b6", "cd91ee41", "401baf6c", "0ebb141c", "9283"];
    function _auth() { return _P.join(""); }

    const kickOff = new Date("2026-03-31T19:45:00Z").getTime();
    let fixtureId = null;

    // 2. محرك الوقت والتحويل للوضع الحي
    const timer = setInterval(() => {
        const now = new Date().getTime();
        const diff = kickOff - now;

        if (diff < 0) {
            document.getElementById("countdown").innerHTML = "LIVE";
            document.getElementById("countdown").style.color = "#ff4500";
            document.getElementById("match-status").innerHTML = "<span class='pulse'>تحليل الأوراكل قيد التنفيذ الآن...</span>";
            
            // استدعاء الدالة الصحيحة كل 60 ثانية
            findAndRunLiveMatch(); 
            setInterval(findAndRunLiveMatch, 60000); 
            
            clearInterval(timer);
            return;
        }

        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        const s = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
        document.getElementById("countdown").innerHTML = `${h} : ${m} : ${s}`;
    }, 1000);

    // 3. دالة البحث والجلب التلقائي
    async function findAndRunLiveMatch() {
        try {
            document.getElementById("api-status").innerText = "📡 جاري البحث عن المباراة...";
            
            // جلب المباريات المباشرة
            const resp = await fetch('https://api-football-v1.p.rapidapi.com/v3/fixtures?live=all', {
                method: 'GET',
                headers: { 'X-RapidAPI-Key': _auth(), 'X-RapidAPI-Host': 'api-football-v1.p.rapidapi.com' }
            });
            const data = await resp.json();

            // البحث بمرونة أكبر (Case-insensitive)
            const match = data.response.find(m => 
                m.teams.home.name.toLowerCase().includes("cz") || 
                m.teams.away.name.toLowerCase().includes("den")
            );

            if (match) {
                fixtureId = match.fixture.id;
                fetchStats(fixtureId);
                document.getElementById("api-status").innerText = "📡 متصل بالمباراة حياً";
            } else {
                document.getElementById("api-status").innerText = "⚠️ لم يتم العثور على المباراة في الـ API";
            }
        } catch (e) { 
            console.log("Error in Search:", e);
            document.getElementById("oracle-log").innerText = "❌ خطأ في الاتصال";
        }
    }

    // 4. جلب الإحصائيات الفعلية
    async function fetchStats(fId) {
        try {
            const resp = await fetch(`https://api-football-v1.p.rapidapi.com/v3/fixtures/statistics?fixture=${fId}`, {
                method: 'GET',
                headers: { 'X-RapidAPI-Key': _auth(), 'X-RapidAPI-Host': 'api-football-v1.p.rapidapi.com' }
            });
            const statsData = await resp.json();
            
            if (statsData.response.length > 0) {
                updateUI(statsData.response[0].statistics);
            }
        } catch (e) { console.log("Stats error:", e); }
    }

    function updateUI(stats) {
        const getVal = (type) => stats.find(s => s.type === type)?.value || 0;
        document.getElementById('possession').innerText = getVal("Ball Possession") || "0%";
        document.getElementById('corners').innerText = getVal("Corner Kicks") || "0";
        document.getElementById('saves').innerText = getVal("Goalkeeper Saves") || "0";
        document.getElementById('counters').innerText = "جاري التحليل..."; 
    }
</script>
</body>
</html>
