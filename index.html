<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Hub | GenYons Premium</title>
    <style>
        :root { --primary: #fbbf24; --bg: #020617; --card: #0f172a; --accent: #38bdf8; }
        body { background: var(--bg); color: #f8fafc; font-family: sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 30px; border-bottom: 2px solid var(--primary); background: #0f172a; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; }
        .card { background: var(--card); border: 1px solid #1e293b; border-radius: 15px; padding: 20px; position: relative; }
        .vip-badge { position: absolute; top: 10px; right: 10px; background: var(--primary); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .teams { font-size: 1.2rem; font-weight: bold; text-align: center; margin: 15px 0; }
        .prediction-box { filter: blur(8px); background: #000; padding: 15px; border-radius: 10px; transition: 0.5s; }
        .unlock-btn { background: var(--primary); color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .status-tag { color: var(--accent); font-size: 0.8rem; text-align: center; display: block; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.8rem; font-weight: 900; color: white;">◈ ORACLE HUB ◈</div>
    <div style="color: var(--accent); font-size: 0.8rem;">GenYons Intelligence Dashboard</div>
</header>

<div id="main-content" class="grid">
    </div>

<script>
    
    const _0x5a21 = ["MGJiNmNkOTFlZTQxNDAxYmFmNmMwZWJiMTQ5NTA..." , 
    "YTM0YjhkZg=="];
    const _0x_v1 = "MGJiNmNkOTFlZTQxNDAxYmFmNmMwZWJiMTQxYzkyODM="; 
    
    function _get_secure_key() {
        
        return atob("MGJiNmNkOTFlZTQxNDAxYmFmNmMwZWJiMTQ5NTA1ODIr").slice(0, -2);
    }

    
    function _decrypt_logic(data) {
        try {
            return atob(data); 
        } catch(e) { return data; }
    }

	async function loadOracleData() {
    const vipGrid = document.getElementById('vip-grid');
    const API_KEY = _get_k(); // استدعاء المفتاح المشفر الذي حقناه سابقاً

    try {
        // 1. جلب التوقعات المشفرة من ملفك المحلي
        const localResponse = await fetch('matches.json');
        const localData = await localResponse.json();

        // 2. جلب النتائج الحية من السيرفر العالمي (Live Score)
        // ملاحظة: استخدمنا id المسابقة المتاحة في خطتك المجانية
        const liveResponse = await fetch('https://api.football-data.org/v4/matches?status=LIVE', {
            headers: { 'X-Auth-Token': API_KEY }
        });
        const liveData = await liveResponse.json();

        vipGrid.innerHTML = '';

        localData.forEach(match => {
            // البحث عن نتيجة المباراة الحية في السيرفر
            const liveMatch = liveData.matches?.find(m => 
                m.homeTeam.name.includes("Argentina") || m.awayTeam.name.includes("Mauritania")
            );

            const scoreText = liveMatch ? 
                `<span style="color:#ef4444;">LIVE: ${liveMatch.score.fullTime.home} - ${liveMatch.score.fullTime.away}</span>` : 
                `🕒 ${match.time}`;

            const card = document.createElement('div');
            card.className = 'card vip-card';
            card.innerHTML = `
                <div class="vip-badge">LIVE UPDATES</div>
                <div class="status-tag">${scoreText}</div>
                <div class="teams">${match.homeTeam} VS ${match.awayTeam}</div>
                
                <div id="${match.id}" class="locked-content" style="filter: blur(10px); opacity: 0.5;">
                    <div class="prediction-text">
                        <strong>توقع الأوراكل الحيي:</strong> ${_decrypt_content(match.encryptedPrediction)}
                    </div>
                </div>

                <button class="unlock-btn" onclick="unlock('${match.id}', null, this, true)">
                    إظهار التحليل المباشر 🔓
                </button>
            `;
            vipGrid.appendChild(card);
        });
    } catch (error) {
        console.error("Fetch Error:", error);
        vipGrid.innerHTML = `<div class='error-msg'>⚠️ جاري تحديث البيانات الحية...</div>`;
    }
}

    function reveal(id) {
        const box = document.getElementById(`pred-${id}`);
        box.style.filter = "none";
        box.parentElement.querySelector('.unlock-btn').style.display = 'none';
    }

    window.onload = initOracle;
</script>
</body>
</html>
